{% extends "admin/change_form.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'css/webapp.css' %}?v={{ APP_VERSION }}">
<style>
    /* Адаптация под админку */
    .admin-wishlist-integration {
        margin-top: 10px;
        background: var(--body-bg);
        border-radius: 16px;
        padding: 5px;
    }
    /* Скрываем кнопки редактирования и удаления в админке */
    .wl-delete-badge, .wishlist-add-btn, .wl-edit-btn { display: none !important; }
    
    /* Стили для сетки в узком контейнере админки */
    .hist-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important;
    }
    
    .vt-btn { border: none !important; cursor: pointer; }
    .vt-btn.active { background: var(--accent) !important; color: white !important; }
    
    /* Переопределение цветов для соответствия теме админки */
    #wl-active-folder-title { color: var(--primary-fg) !important; }
    .grid-below-title { color: var(--primary-fg) !important; }
</style>
{% endblock %}

{% block admin_change_form_document_ready %}
{{ block.super }}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script>
    // Заглушки для работы wishlist.js вне Telegram
    window.tg = { initData: "" };
    window.IS_ADMIN_DASHBOARD = true; // Блокирует авто-инит из webapp.js
    
    // Переопределяем открытие слоя шоу на открытие страницы админки шоу
    window.App = window.App || {};
    window.App.openShowLayer = function(id) {
        window.open(`/admin/app/show/${id}/change/`, '_blank');
    };

    document.addEventListener('DOMContentLoaded', async function() {
        const folderId = "{{ object_id }}";
        if (!folderId || folderId === "None") return;

        const container = document.getElementById('wl-items-container');
        container.innerHTML = '<div class="loader-inline"><div class="spinner"></div></div>';

        try {
            const r = await fetch(`/api/admin/wishlist/folder/${folderId}/`);
            if (!r.ok) throw new Error();
            const data = await r.json();
            
            // Настройка глобальных переменных для wishlist.js
            window.activeWlFolderId = parseInt(folderId);
            window.wishlistFolders = [data]; 
            
            // Инициализация иконок и отрисовка
            if (typeof initIcons === 'function') initIcons();
            if (typeof renderActiveWlFolder === 'function') renderActiveWlFolder();
            
        } catch (e) {
            container.innerHTML = '<div class="empty">Ошибка загрузки содержимого</div>';
        }
    });
</script>
<script src="{% static 'js/webapp.js' %}?v={{ APP_VERSION }}"></script>
<script src="{% static 'js/wishlist.js' %}?v={{ APP_VERSION }}"></script>
{% endblock %}
