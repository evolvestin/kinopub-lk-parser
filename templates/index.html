{% load static %}
{% load django_vite %}
<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>KinoPub Observer - Метрики</title>
    <link rel="stylesheet" href="{% static 'css/kp_theme.css' %}?v={{ APP_VERSION }}">
    <link rel="stylesheet" href="{% static 'css/webapp.css' %}?v={{ APP_VERSION }}">
    <script>
        window.IS_AUTHENTICATED = {{ user.is_authenticated|yesno:"true,false" }};
        window.ALL_METRICS = {{ metrics_json|safe }};
        window.LAST_ACTIONS = {
            history: "{{ last_actions.history|escapejs }}",
            parser_run: "{{ last_actions.parser_run|escapejs }}",
            shows: "{{ last_actions.shows|escapejs }}",
            ratings: "{{ last_actions.ratings|escapejs }}",
            durations: "{{ last_actions.durations|escapejs }}",
            photos: "{{ last_actions.photos|escapejs }}",
            tg: "{{ last_actions.tg|escapejs }}"
        };
        window.ERRORS_24H = {{ errors_24h_count }};
        window.BOT_USERS_ACTIVE = {{ bot_users_active }};
        window.BOT_USERS_TOTAL = {{ bot_users_total }};
        window.ADMIN_APP_LIST = [
            {% for app in app_list %}
            {
                name: "{{ app.name|escapejs }}",
                models: [
                    {% for model in app.models %}
                    {
                        name: "{{ model.name|escapejs }}",
                        admin_url: "{{ model.admin_url|escapejs }}",
                        add_url: "{% if model.add_url %}{{ model.add_url|escapejs }}{% endif %}"
                    },
                    {% endfor %}
                ]
            },
            {% endfor %}
        ];
        window.ADMIN_CONTEXT = {
            is_authenticated: window.IS_AUTHENTICATED,
            last_actions: window.LAST_ACTIONS,
            errors_24h_count: window.ERRORS_24H,
            bot_users_active: window.BOT_USERS_ACTIVE,
            bot_users_total: window.BOT_USERS_TOTAL
        };
    </script>
    {% vite_hmr_client %}
    {% vite_asset 'src/main.js' %}
</head>
<body>
    <div id="admin-app"></div>
</body>
</html>
