{% load static %}
<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KinoPub Observer - Метрики</title>
    <link rel="stylesheet" href="{% static 'css/kp_theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/webapp.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        body { background: var(--bg-main); overflow-x: hidden; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; padding-top: 20px; }
        .layer-header { position: sticky; top: 0; z-index: 50; display: flex; justify-content: center; background: rgba(20, 24, 31, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
        .header-container { max-width: 1200px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
        .header-title { font-size: 20px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px; }
        .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .nav-btn { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border); padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; transition: transform var(--transition-bounce), background var(--transition-smooth); }
        .nav-btn:hover { background: var(--border); transform: translateY(-2px); }
        .nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        
        .metrics-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 20px; 
            padding: 16px; 
        }
        @media (max-width: 500px) {
            .metrics-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="layer-header">
        <div class="header-container">
            <div class="header-title">KinoPub Observer</div>
            <div class="nav-links">
                <a href="/" class="nav-btn active">Метрики</a>
                <a href="/admin/" class="nav-btn">Админка</a>
                <a href="/admin/tasks/" class="nav-btn">Задачи</a>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="tabs" id="metric-tabs">
            <button class="tab on" data-period="now" onclick="switchPeriod('now')">Сейчас</button>
            <button class="tab" data-period="yesterday" onclick="switchPeriod('yesterday')">Вчера</button>
            <button class="tab" data-period="week_ago" onclick="switchPeriod('week_ago')">7 дней назад</button>
        </div>

        <div class="metrics-grid">
            <div class="card hoverable anim-item">
                <div class="label">
                    <div class="icon" style="color:var(--danger)">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    </div>
                    Нет рейтинга Кинопоиска
                </div>
                <div class="chart-box" style="height:320px;">
                    <canvas id="missingKpChart"></canvas>
                </div>
                <div id="legend-missing-kp" class="legend-grid"></div>
            </div>

            <div class="card hoverable anim-item">
                <div class="label">
                    <div class="icon" style="color:var(--info)">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </div>
                    Коллизии названий
                </div>
                <div class="chart-box" style="height:320px;">
                    <canvas id="collisionsChart"></canvas>
                </div>
                <div id="legend-collisions" class="legend-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const allMetrics = {{ metrics_json|safe }};
        const charts = {};
        const palette = ['#e74c3c', '#d29922', '#388bfd', '#a371f7', '#1abc9c', '#e67e22', '#9b59b6', '#2ea043'];

        const createCenterTextPlugin = (label) => ({
            id: 'centerText_' + label,
            afterDraw: (chart) => {
                const { ctx, chartArea: { top, height, left, width } } = chart;
                ctx.save();
                const total = chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                const centerX = left + width / 2;
                const centerY = top + height / 2;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '900 34px system-ui';
                ctx.fillStyle = '#e5e7eb';
                ctx.fillText(total.toLocaleString('ru-RU'), centerX, centerY - 8);
                ctx.font = 'bold 10px system-ui';
                ctx.fillStyle = '#6e7681';
                ctx.letterSpacing = '1px';
                ctx.fillText(label, centerX, centerY + 22);
                ctx.restore();
            }
        });

        function renderDoughnut(chartKey, canvasId, legendId, rawData, centerLabel, valueField) {
            const data = rawData.filter(i => i[valueField] > 0);
            const canvas = document.getElementById(canvasId);
            const legendEl = document.getElementById(legendId);

            if (charts[chartKey]) charts[chartKey].destroy();

            if (data.length === 0) {
                legendEl.innerHTML = '<div class="empty">Нет данных за этот период</div>';
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            const total = data.reduce((acc, item) => acc + item[valueField], 0);

            charts[chartKey] = new Chart(canvas.getContext('2d'), {
                type: 'doughnut',
                plugins: [createCenterTextPlugin(centerLabel)],
                data: {
                    labels: data.map(i => i.name || i.type),
                    datasets: [{
                        data: data.map(i => i[valueField]),
                        backgroundColor: data.map((_, i) => palette[i % palette.length]),
                        borderWidth: 0,
                        hoverOffset: 15,
                        borderRadius: 6,
                        spacing: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '55%',
                    layout: { padding: 15 },
                    animation: { animateRotate: true, duration: 1200, easing: 'easeOutQuart' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(22, 27, 34, 0.95)',
                            titleColor: '#f0f6fc',
                            bodyColor: '#8b949e',
                            borderColor: '#2d333b',
                            borderWidth: 1,
                            cornerRadius: 10,
                            padding: 12,
                            callbacks: {
                                label: (context) => {
                                    const val = context.parsed;
                                    const pct = total > 0 ? Math.round((val / total) * 100) : 0;
                                    return ` ${val.toLocaleString('ru-RU')} шт. (${pct}%)`;
                                }
                            }
                        }
                    }
                }
            });

            legendEl.innerHTML = data.map((item, i) => {
                const color = palette[i % palette.length];
                const pct = total > 0 ? Math.round((item[valueField] / total) * 100) : 0;
                return `
                <div class="legend-item">
                    <div class="legend-dot" style="background:${color}"></div>
                    <div class="legend-name">${item.name || item.type}</div>
                    <div class="legend-val">${item[valueField].toLocaleString('ru-RU')} (${pct}%)</div>
                </div>`;
            }).join('');
        }

        function switchPeriod(period) {
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.toggle('on', btn.dataset.period === period);
            });
            
            renderDoughnut(
                'missing', 
                'missingKpChart', 
                'legend-missing-kp', 
                allMetrics.missing_kp[period] || [], 
                'БЕЗ КП', 
                'value'
            );
            
            renderDoughnut(
                'collisions', 
                'collisionsChart', 
                'legend-collisions', 
                allMetrics.title_collision[period] || [], 
                'КОЛЛИЗИЙ', 
                'collisions'
            );
        }

        document.addEventListener('DOMContentLoaded', () => {
            switchPeriod('now');
        });
    </script>
</body>
</html>
