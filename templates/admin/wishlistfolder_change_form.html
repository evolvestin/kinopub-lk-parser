{% extends "admin/change_form.html" %}
{% load static %}
{% load django_vite %}

{% block extrahead %}
{{ block.super }}
{% vite_hmr_client %}
{% vite_asset 'src/main.js' %}
<script>
    window.FOLDER_ID = "{{ object_id }}";
    window.IS_ADMIN_DASHBOARD = true;
</script>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'css/webapp.css' %}?v={{ APP_VERSION }}">
<style>
    .preview-meta-info {
        margin: 10px auto 15px;
        text-align: center;
        font-size: 12px;
        color: var(--body-fg);
        font-family: monospace;
        background: var(--darkened-bg);
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        width: fit-content;
    }

    .admin-wishlist-integration {
        margin: 0 auto;
        background: var(--body-bg);
        border-radius: 38px;
        padding: 0;
        border: 10px solid #1b1f26;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        position: relative;
        outline: 1px solid var(--border-color);
    }

    #admin-wishlist-preview {
        height: 100% !important;
        display: flex !important;
        flex-direction: column !important;
        min-height: 0 !important;
    }

    #wl-active-folder-content {
        height: 100% !important;
        display: flex !important;
        flex-direction: column !important;
        background: var(--bg-main);
    }

    .wl-active-header {
        flex-shrink: 0 !important;
        background: var(--primary) !important;
        border-bottom: 1px solid var(--border-color) !important;
        padding: 12px !important;
    }

    #wl-items-container {
        flex: 1 !important;
        overflow-y: auto !important;
        padding: 10px !important;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
    }

    #wl-items-container::-webkit-scrollbar {
        display: none;
    }

    .wl-delete-badge, 
    .wishlist-add-btn, 
    .wl-edit-btn, 
    .theme-btn, 
    .bottom-nav {
        display: none !important;
    }
</style>
{% endblock %}
