{% extends "admin/base_site.html" %}
{% load static %}
{% load django_vite %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'css/webapp.css' %}?v={{ APP_VERSION }}">
{% vite_hmr_client %}
{% vite_asset 'src/main.js' %}
<style>
    #header { padding: 10px 40px; }
    .breadcrumbs { padding: 10px 40px; margin: 0; }
    #content { padding: 20px 40px; }
    .module h2, .module caption { margin: 0; padding: 5px 10px; }
    
    .webapp-container { max-width: 1400px; margin: 0 auto; padding-top: 20px; }
    .wa-nav-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .wa-nav-btn {
        background: var(--bg-input);
        color: var(--text-primary);
        border: 1px solid var(--border);
        padding: 8px 16px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s, background 0.2s;
        min-width: 130px;
        text-align: center;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    .wa-nav-btn:hover { background: var(--border); transform: translateY(-2px); }
    .wa-nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
{% endblock %}

{% block content %}
<script>
    window.GLOBAL_STATS = {{ global_stats_json|safe }};
</script>
<div class="webapp-container">
    <div class="wa-nav-links">
        <a href="/" class="wa-nav-btn">Метрики</a>
        <a href="/admin/" class="wa-nav-btn active">Админка</a>
        <a href="/admin/tasks/" class="wa-nav-btn">Задачи</a>
    </div>

    <div id="admin-stats-app"></div>
</div>

<script>
    window.IS_ADMIN_DASHBOARD = true;
</script>
{% endblock %}
