<div class="preview-meta-info">
    {% if is_default %}
    ⚠️ Используется стандартное разрешение (Admin Default): <b>{{ width }}x{{ height }}</b>
    {% else %}
    📱 Разрешение устройства пользователя: <b>{{ width }}x{{ height }}</b>
    {% endif %}
</div>

<div id="view-wishlist" class="admin-wishlist-integration" style="width: {{ width }}px; height: {{ height }}px; max-width: 95%;">
  <div id="admin-wishlist-preview"></div>
</div>
