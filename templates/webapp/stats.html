{% load django_vite %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Kinopub Observer</title>
    <script>
        window.IS_DEBUG = {{ is_debug|yesno:"true,false" }};
        window.USER_ROLE = "{{ user_role|escapejs }}";
        console.log("HTML Template loaded. Looking for Vite assets...");
        window.onerror = function(msg, url, line) {
            console.error("GLOBAL ERROR: " + msg + "\nURL: " + url + "\nLine: " + line);
        };
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            let initData = window.Telegram?.WebApp?.initData || '';
            if (!initData) {
                const hash = window.location.hash || '';
                const search = window.location.search || '';
                const params = new URLSearchParams(hash.replace('#', '?') || search);
                initData = params.get('tgWebAppData') || params.get('init_data') || '';
                if (!initData && hash.includes('tgWebAppData=')) {
                    const match = hash.match(/tgWebAppData=([^&]+)/);
                    if (match) {
                        initData = decodeURIComponent(match[1]);
                    }
                }
            }
            if (initData && initData !== 'undefined' && initData !== 'null') {
                window.__telegram_init_data__ = initData;
                try { sessionStorage.setItem('tg_init_data', initData); } catch (e) {}
                try { localStorage.setItem('tg_init_data', initData); } catch (e) {}
                try {
                    document.cookie = "tg_init_data=" + encodeURIComponent(initData) + "; path=/; SameSite=Lax; max-age=604800";
                } catch (e) {}
            }
        })();
    </script>
    {% vite_hmr_client %}
    {% vite_asset 'src/main.js' %}
</head>
<body>
    <div id="app"></div>
    <script>
        console.log("Target div#app rendered. If screen is white, main.js failed to load or execute.");
    </script>
</body>
</html>
