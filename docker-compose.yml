services:
  init:
    image: busybox
    command: sh -c "mkdir -p /data && chown -R 1000:1000 /data"
    volumes:
      - ./data:/data

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    command: postgres -c 'max_connections=100' -c 'shared_buffers=256MB'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - kinopub-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - kinopub-net

  app-init:
    build: .
    env_file: .env
    volumes:
      - .:/app:delegated
      - ./data:/data
    command: >
      sh -c "
        if [ \"$ENVIRONMENT\" = \"DEV\" ]; then
          echo \"Starting restore from backup...\" &&
          python manage.py restorebackup;
        fi &&
        python manage.py migrate --noinput &&
        python manage.py createsuperuserifneeded
      "
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - kinopub-net

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${WEB_PORT:-8012}:8000"
    volumes:
      - .:/app:delegated
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: >
      sh -c "
        python manage.py collectstatic --noinput &&
        if [ \"$DJANGO_DEBUG\" = \"true\" ] || [ \"$DJANGO_DEBUG\" = \"True\" ]; then
          python manage.py runserver 0.0.0.0:8000;
        else
          gunicorn kinopub_parser.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2;
        fi
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      app-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - kinopub-net

  asgi:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${ASGI_PORT:-8013}:8001"
    volumes:
      - .:/app:delegated
    command: daphne -b 0.0.0.0 -p 8001 kinopub_parser.asgi:application
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      app-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - kinopub-net

  celery:
    build: .
    command: celery -A kinopub_parser worker -l INFO --concurrency=4
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app:delegated
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      app-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - kinopub-net
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'celery worker' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    build: .
    command: celery -A kinopub_parser beat -l INFO --schedule=/data/celerybeat-schedule
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app:delegated
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      app-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - kinopub-net
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'celery' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  email-listener:
    build: .
    command: python manage.py runemaillistener
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app:delegated
    depends_on:
      app-init:
        condition: service_completed_successfully
    networks:
      - kinopub-net
  
  telegram-bot:
    build:
      context: ./telegram_bot
    restart: unless-stopped
    env_file: .env
    environment:
      - BACKEND_URL=http://web:8000
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./telegram_bot:/app
    networks:
      - kinopub-net
  
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --url http://web:8000 --protocol http2
    profiles:
      - dev 
    networks:
      - kinopub-net
    depends_on:
      web:
        condition: service_healthy
  
  tunnel-monitor:
    build:
      context: ./tunnel_monitor
    profiles:
      - dev
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kinopub-net
    depends_on:
      telegram-bot:
        condition: service_started
      tunnel:
        condition: service_started
  
  health-monitor:
    build: .
    user: root
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app:delegated
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: python manage.py runhealthdaemon
    depends_on:
      app-init:
        condition: service_completed_successfully
    networks:
      - kinopub-net

volumes:
  pgdata:
    name: ${PG_VOLUME_NAME:-kinopub_parser_pgdata}

networks:
  kinopub-net:
    driver: bridge