services:
  init:
    image: busybox
    command: sh -c "mkdir -p /data && chown -R 1000:1000 /data"
    volumes:
      - ./data:/data

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    shm_size: '256mb'
    env_file: .env
    command: postgres -c 'max_connections=100' -c 'shared_buffers=256MB'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - kinopub-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - kinopub-net

  app-init:
    build: .
    env_file: .env
    volumes:
      - .:/app:delegated
      - /app/frontend_webapp/dist # Сохраняем билд фронта внутри контейнера
      - ./data:/data
    command: >
      sh -c "
        if [ \"$ENVIRONMENT\" = \"DEV\" ] && [ \"$SKIP_DB_RESTORE\" != \"true\" ] && [ \"$SKIP_DB_RESTORE\" != \"True\" ]; then
          echo \"Starting restore from backup...\" &&
          python manage.py restorebackup;
        fi &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        python manage.py createsuperuserifneeded
      "
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - kinopub-net

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${WEB_PORT:-8012}:8000"
    volumes:
      - .:/app:delegated
      - /app/frontend_webapp/dist # Сохраняем билд фронта внутри контейнера
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - VITE_DEV_SERVER_HOST=frontend # Django должен искать Vite по имени контейнера
    command: >
      sh -c "
        python manage.py collectstatic --noinput &&
        if [ \"$DJANGO_DEBUG\" = \"true\" ] || [ \"$DJANGO_DEBUG\" = \"True\" ]; then
          python manage.py runserver 0.0.0.0:8000;
        else
          gunicorn kinopub_parser.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2;
        fi
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin/login/ && python manage.py healthcheck --touch"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      app-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - kinopub-net

  asgi:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${ASGI_PORT:-8013}:8001"
    volumes:
      - .:/app:delegated
      - /app/frontend_webapp/dist # Сохраняем билд фронта
      - ./data:/data
    environment:
      - VITE_DEV_SERVER_HOST=frontend
    command: daphne -b 0.0.0.0 -p 8001 kinopub_parser.asgi:application
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/ && python manage.py healthcheck --touch"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      app-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - kinopub-net

  celery:
    build: .
    command: celery -A kinopub_parser worker -l INFO --concurrency=4
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app:delegated
      - /app/frontend_webapp/dist # Сохраняем билд фронта
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      app-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - kinopub-net
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'celery worker' && python manage.py healthcheck --touch" ]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    build: .
    command: celery -A kinopub_parser beat -l INFO --schedule=/data/celerybeat-schedule
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app:delegated
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      app-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - kinopub-net
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'celery' && python manage.py healthcheck --touch" ]
      interval: 30s
      timeout: 10s
      retries: 3

  email-listener:
    build: .
    command: python manage.py runemaillistener
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app:delegated
      - ./data:/data
    depends_on:
      app-init:
        condition: service_completed_successfully
    networks:
      - kinopub-net
  
  telegram-bot:
    build:
      context: ./telegram_bot
    restart: unless-stopped
    env_file: .env
    environment:
      - BACKEND_URL=http://web:8000
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./telegram_bot:/app
    networks:
      - kinopub-net

  tunnel:
    image: node:20-alpine
    restart: unless-stopped
    profiles:
      - dev
    network_mode: "service:asgi"
    depends_on:
      - asgi
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
    command: >
      sh -c "
        npm install -g tunnelmole &&
        tmole 8001
      "

  tunnel-monitor:
    build:
      context: ./tunnel_monitor
    profiles:
      - dev
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kinopub-net
    depends_on:
      telegram-bot:
        condition: service_started
      tunnel:
        condition: service_started
  
  health-monitor:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app:delegated
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: python manage.py runhealthdaemon
    healthcheck:
      test: [ "CMD", "python", "manage.py", "healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      app-init:
        condition: service_completed_successfully
    networks:
      - kinopub-net
    
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend_webapp
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend_webapp:/app/frontend_webapp:delegated
      - ./kinopub_parser/static/css:/app/kinopub_parser/static/css:ro
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_DEV_SERVER_HOST=${VITE_DEV_SERVER_HOST:-localhost}
      - WEBAPP_PUBLIC_URL=${WEBAPP_PUBLIC_URL}
    networks:
      kinopub-net:
        aliases:
          - dynamic-vite-host.internal
    profiles:
      - dev

volumes:
  pgdata:
    name: ${PG_VOLUME_NAME:-kinopub_parser_pgdata}

networks:
  kinopub-net:
    driver: bridge